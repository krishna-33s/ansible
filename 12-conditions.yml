- name: gathering facts
  hosts: local
  connection: local

  tasks: 
  - name: ansiblefacts 
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"

  - name: redhat conditions
    ansible.builtin.debug:
      msg: "This is a redhat package manger" 
    when: ansible_facts.os_family == "RedHat"

  - name: debian conditions
    ansible.builtin.debug:
      msg: "This is a debian package manager" 
    when: ansible_facts.os_family == "Debian"     
