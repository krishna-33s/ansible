- name: conditions
  hosts: local
  connection: local

  tasks: 
  - name: ansiblefacts 
    ansible.builtin.debug:
      msg: "{{ansible_facts}}"

  - name: redhat conditions
    ansible.builtin.debug:
      msg: "Redhat family" 
    when: ansible_facts.os_family == "Redhat"

  - name: debian conditions
    ansible.builtin.debug:
      msg: "Debian family" 
    when: ansible_facts.os_family == "Debian"     
