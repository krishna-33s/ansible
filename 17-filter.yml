- name: demo on filters
  hosts: local
  connection: local
  vars:
    student: "KrishnA"
    my_id: "196.23.21.33"
    skills: python, ansible, linux, shell
    tagsMap:
      name: project
      tools: ansible
      projectname: roboshop
    tagsList:
      [
          {
              "key": "name",
              "value": "project"
          },
          {
              "key": "tools",
              "value": "ansible"
          },
          {
              "key": "projectname",
              "value": "roboshop"
          }
      ]

  tasks:
  - name: default printing
    ansible.builtin.debug:
      msg: " hii this is {{ introduce | default('harini')}}"  

  - name: string to listing
    ansible.builtin.debug:
      msg: "{{ skills | split(',') }}"

  - name: map to listing
    ansible.builtin.debug:
      msg: "{{ tagsMap | dict2items }}"

  - name: list to map
    ansible.builtin.debug:
      msg: "{{ tagsList | items2dict}}"

  - name: read student file
    ansible.builtin.set_fact:
      candidate_yml: "{{ lookup('file', 'students.yml' ) | from_yaml }}"

  - name: print json file
    ansible.builtin.debug:
      msg: "{{ candidate_yml | to_nice_json }}"       

  - name: uppercase
    ansible.builtin.debug:
      msg: "{{ student | upper }}" 

  - name: lowercase
    ansible.builtin.debug:
      msg: "{{ student | lower }}"

  - name: cheking valid my_id
    ansible.builtin.debug:
      msg: "{{ my_id | ansible.utils.ipv4 }}"            