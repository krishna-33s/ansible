- name: demo on filters
  hosts: local
  connection: local
  vars:
   skills: python, ansible, linux, shell
   tagsMap:
    name: project
    tools: ansible
    projectname: roboshop
   tagsList:
     [
        {
            "key": "name",
            "value": "project"
        },
        {
            "key": "tools",
            "value": "ansible"
        },
        {
            "key": "projectname",
            "value": "roboshop"
        }
    ]

  tasks:
  - name: default printing
    ansible.builtin.debug:
      msg: " hii this is {{ introduce | default('harini')}}"  

  - name: string to listing
    ansible.builtin.debug:
      msg: "{{ skills | split(',') }}"

  - name: map to listing
    ansible.builtin.debug:
      msg: "{{ tagsMap | dict2items }}"

  - name: list to map
    ansible.builtin.debug:
      msg: "{{ tagsList | items2dict}}"

  - name: yaml to json
    ansible.builtin.debug:
     candidate.yml: "{{ lookup( 'file' ),'students.yml' | from yaml}}"
         